
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dream Neon Studio | Premium Handcrafted Neon</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;900&family=Orbitron:wght@400;700;900&family=Caveat:wght@400;700&family=Dancing+Script:wght@400;700&family=Montserrat:wght@400;900&family=Pacifico&family=Monoton&family=Bungee&family=Permanent+Marker&family=Playfair+Display:wght@700&family=Satisfy&family=Yellowtail&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #000000;
            color: white;
            overflow-x: hidden;
        }
        .font-orbitron {
            font-family: 'Orbitron', sans-serif;
        }
        .nav-link {
            position: relative;
            transition: color 0.3s ease;
        }
        .nav-link::after {
            content: '';
            position: absolute;
            width: 0;
            height: 1px;
            bottom: -4px;
            left: 0;
            background-color: #ff00ff;
            transition: width 0.3s ease;
        }
        .nav-link:hover::after {
            width: 100%;
        }
        .neon-text-magenta {
            text-shadow: 0 0 10px #ff00ff, 0 0 20px #ff00ff;
        }
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        @keyframes slide-in-left {
            from { transform: translateX(-50px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
        .category-item {
            animation: slide-in-left 0.6s ease-out forwards;
        }
        .floating-whatsapp {
            animation: bounce-subtle 3s infinite ease-in-out;
        }
        @keyframes bounce-subtle {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        .dream-gradient {
            background: linear-gradient(90deg, #ff00ff, #00ffff, #bfff00, #ff00ff);
            background-size: 300% 300%;
            animation: dream-flow 8s ease infinite;
        }
        @keyframes dream-flow {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
    </style>
